<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BGM Player</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>BGM Player</h1>
        <p>개인용 · 유튜브 카테고리 랜덤 재생</p>
      </header>

      <section class="now-playing" aria-live="polite">
        <div class="label">Now Playing</div>
        <div class="title" id="track-title">카테고리를 선택하고 재생하세요</div>
        <div class="meta" id="track-meta"></div>
      </section>

      <nav class="categories" id="category-buttons" aria-label="카테고리"></nav>

      <div class="controls">
        <button type="button" class="ctrl-btn primary" id="btn-play-pause" aria-label="재생/일시정지">
          ▶
        </button>
        <button type="button" class="ctrl-btn" id="btn-next" aria-label="다음 곡 랜덤">
          ⏭
        </button>
      </div>

      <div class="options">
        <label class="option">
          <input type="checkbox" id="opt-auto-next" checked />
          곡 끝나면 자동 다음
        </label>
        <label class="option">
          <input type="checkbox" id="opt-compact" />
          작은 플레이어
        </label>
      </div>

      <div class="volume-row">
        <span>🔊</span>
        <input type="range" id="volume" min="0" max="100" value="70" />
        <span id="volume-label">70</span>
      </div>

      <div class="player-wrap" id="player-wrap">
        <div id="player"></div>
        <div class="player-placeholder" id="player-placeholder">재생 시 영상이 표시됩니다</div>
      </div>

      <footer>
        곡 추가: <code>categories.js</code>에 YouTube videoId를 넣으세요.<br />
        로컬 실행: 프로젝트 폴더에서 <code>npx serve .</code> 또는 <code>python -m http.server 8080</code>
      </footer>
    </div>

    <script src="categories.js"></script>
    <script src="app.js"></script>
    <script>
      document.getElementById("volume").addEventListener("input", (e) => {
        document.getElementById("volume-label").textContent = e.target.value;
      });
    </script>
  </body>
</html>
